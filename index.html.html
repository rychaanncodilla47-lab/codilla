<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio - Home</title>
</head>
<body>

    <h1>Welcome to My Portfolio</h1>

    <nav>
        <a href="home.html">Home</a> |
        <a href="project.html">My Projects</a> |
        <a href="about me.html">About Me</a> |
        <a href="contacts.html">Contact</a>
    </nav>

    <hr>

<style>
/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body */
body {
    font-family: Arial, sans-serif;
    background-color: #fffbea;
    color: #333;
    text-align: center;
    line-height: 1.6;
}

/* Navigation */
nav {
    background-color: #ffcc00;
    padding: 15px;
}

nav a {
    color: #333;
    text-decoration: none;
    margin: 0 15px;
    font-weight: bold;
    font-size: 16px;
}

nav a:hover {
    color: white;
}

/* Main Headings */
h1 {
    margin: 25px 0;
    color: #e6b800;
    font-size: 36px;
}

h2 {
    color: #ffcc00;
    margin-bottom: 10px;
}

/* Section */
section {
    padding: 40px;
}

/* Project Cards */
.project {
    background: white;
    margin: 20px auto;
    padding: 25px;
    width: 60%;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    transition: transform 0.3s ease;
}

.project:hover {
    transform: scale(1.05);
}

/* Contact Form */
form {
    background: white;
    padding: 25px;
    width: 50%;
    margin: 20px auto;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

input, textarea {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    padding: 12px 25px;
    border: none;
    background-color: #ffcc00;
    color: #333;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #e6b800;
    color: white;
}

/* Footer */
footer {
    margin-top: 40px;
    padding: 20px;
    background-color: #ffcc00;
    color: #333;
}
  
    
 
</style>
</body>
</html>
