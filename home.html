<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio - Home</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #fff9c4, #ffcc00);
            text-align: center;
            color: #333;
        }

        nav {
            background: #ffcc00;
            padding: 15px;
            animation: slideDown 1s ease;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            margin: 0 15px;
            transition: 0.3s;
        }

        nav a:hover {
            color: white;
        }

        .hero {
            padding: 80px 20px;
            animation: fadeIn 2s ease;
        }

        /* Profile Picture Style */
        .profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid white;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.8);
            animation: float 3s ease-in-out infinite;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h2 {
            color: #e6b800;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #333;
            color: #ffcc00;
            text-decoration: none;
            border-radius: 30px;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            color: #333;
        }

        /* Animations */
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideDown {
            from {transform: translateY(-100%);}
            to {transform: translateY(0);}
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

    </style>
</head>

<body>

    <nav>
        <a href="home.html">Home</a>
        <a href="project.html">My Projects</a>
        <a href="about me.html">About Me</a>
        <a href="contacts.html">Contact</a>
    </nav>

    <section class="hero">

        <!-- CHANGE image.jpg to your photo file name -->
        <img src="selfie.jpeg" alt="My Photo" class="profile-pic">

        <h1>Hello, I'm Rycha Ann A. Codilla</h1>
        <h2>BSCS2C</h2>
        <p>Have fun exploring  my porfolio.</p>

        <a href="project.html" class="btn">View My Projects</a>

    </section>

</body>
</html>
